<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>User Dashboard - Security System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f1f4f9;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            font-weight: 500;
        }

        .logout-btn {
            background: #dc3545;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #a71d2a;
        }

        .dashboard {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .card h3 {
            margin-bottom: 15px;
            color: #1f2937;
        }

        .user-details p {
            margin-bottom: 10px;
            font-size: 15px;
        }

        .actions button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        .refresh-btn {
            background: #2563eb;
            color: white;
        }

        .refresh-btn:hover {
            background: #1e40af;
        }

        .status {
            font-weight: 500;
            margin-top: 10px;
        }

        .status.error {
            color: red;
        }

        .status.success {
            color: green;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🔐 Security System</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="dashboard">

    <div class="card">
        <h3>👤 User Profile</h3>

        <div class="user-details" id="userInfo">
            Loading user information...
        </div>

        <div class="actions">
            <button class="refresh-btn" onclick="loadUser()">Refresh Info</button>
        </div>

        <div class="status" id="statusMessage"></div>
    </div>

</div>

<script>

    // 🔹 1. Get token from URL
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get("token");

    if (tokenFromUrl) {
        localStorage.setItem("jwt", tokenFromUrl);
        window.history.replaceState({}, document.title, "/index.html");
    }

    const jwt = localStorage.getItem("jwt");

    if (!jwt) {
        document.getElementById("userInfo").innerHTML =
            "<p>Not logged in. Please login first.</p>";
    } else {
        loadUser();
    }

    // 🔹 2. Load user from backend
    function loadUser() {

        document.getElementById("statusMessage").innerText = "Loading...";
        document.getElementById("statusMessage").className = "status";

        fetch("http://localhost:8083/users/me", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + jwt
            }
        })
            .then(res => {
                if (!res.ok) throw new Error("Unauthorized");
                return res.json();
            })
            .then(data => {

                document.getElementById("userInfo").innerHTML = `
                <p><strong>Email:</strong> ${data.username ?? data.email}</p>
                <p><strong>User ID:</strong> ${data.id}</p>
                <p><strong>Roles:</strong> ${data.roles ? data.roles.join(", ") : "USER"}</p>
            `;

                document.getElementById("statusMessage").innerText = "Profile loaded successfully.";
                document.getElementById("statusMessage").className = "status success";
            })
            .catch(() => {

                document.getElementById("userInfo").innerHTML =
                    "<p>Session expired. Please login again.</p>";

                document.getElementById("statusMessage").innerText = "Unauthorized access.";
                document.getElementById("statusMessage").className = "status error";

                localStorage.removeItem("jwt");
            });
    }

    // 🔹 3. Logout function
    function logout() {
        localStorage.removeItem("jwt");
        window.location.href = "/";
    }

</script>

</body>
</html>
