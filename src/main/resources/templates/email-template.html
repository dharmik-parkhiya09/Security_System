<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${subject}">Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            margin: auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .header {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
        }
        .content {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #007bff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        Security System
    </div>

    <div class="content">
        <p>Dear <span th:text="${name}">User</span>,</p>

        <p th:text="${message}">
            This is a dynamic message.
        </p>

        <a th:if="${actionUrl != null}"
           th:href="${actionUrl}"
           style="display:inline-block;
          padding:12px 24px;
          background-color:#007bff;
          color:#ffffff;
          text-decoration:none;
          border-radius:6px;">
            <span th:text="${buttonText}">Verify Account</span>
        </a>

        <p style="margin-top:20px;">
            If you did not request this, please ignore this email.
        </p>

        <p>Regards,<br/>Security Team</p>
    </div>

    <div class="footer">
        © 2026 Security System. All rights reserved.
    </div>

</div>
</body>
</html>
